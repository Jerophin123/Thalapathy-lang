<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glow for emblem -->
    <filter id="emblem-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="#0a0505" />

  <!-- Flag area with inner padding -->
  <g transform="translate(56, 80)">
    <!-- Flag outline / border -->
    <rect x="0" y="0" width="400" height="352" rx="16" fill="#1a1010" stroke="#5c2020" stroke-width="2" />

    <!-- Top maroon band -->
    <rect x="8" y="8" width="384" height="112" rx="12" fill="#8B0000" />
    <!-- Rounded top-left and top-right only for top band -->

    <!-- Middle yellow band -->
    <rect x="8" y="120" width="384" height="112" fill="#FFD700" />

    <!-- Bottom maroon band -->
    <rect x="8" y="232" width="384" height="112" rx="12" fill="#8B0000" />

    <!-- ===== Central Emblem on yellow band ===== -->
    <g transform="translate(200, 176)" filter="url(#emblem-glow)">

      <!-- Vaagai Flower (center) - stylized 5-petal flower -->
      <g fill="#8B0000">
        <!-- Center circle -->
        <circle cx="0" cy="0" r="10" />
        <!-- Petals -->
        <ellipse cx="0" cy="-20" rx="7" ry="14" />
        <ellipse cx="19" cy="-6" rx="7" ry="14" transform="rotate(72, 19, -6)" />
        <ellipse cx="12" cy="16" rx="7" ry="14" transform="rotate(144, 12, 16)" />
        <ellipse cx="-12" cy="16" rx="7" ry="14" transform="rotate(216, -12, 16)" />
        <ellipse cx="-19" cy="-6" rx="7" ry="14" transform="rotate(288, -19, -6)" />
        <!-- Inner stamen dots -->
        <circle cx="0" cy="-10" r="2.5" fill="#FFD700" />
        <circle cx="9.5" cy="-3" r="2.5" fill="#FFD700" />
        <circle cx="5.9" cy="8" r="2.5" fill="#FFD700" />
        <circle cx="-5.9" cy="8" r="2.5" fill="#FFD700" />
        <circle cx="-9.5" cy="-3" r="2.5" fill="#FFD700" />
      </g>

      <!-- Left Elephant (facing right/inward) -->
      <g transform="translate(-70, -5) scale(0.7)" fill="#8B0000">
        <!-- Body -->
        <ellipse cx="0" cy="0" rx="28" ry="20" />
        <!-- Head -->
        <circle cx="25" cy="-8" r="16" />
        <!-- Ear -->
        <ellipse cx="15" cy="-12" rx="10" ry="14" />
        <!-- Trunk curling down -->
        <path d="M 38,-4 Q 48,5 44,18 Q 42,24 38,22 Q 40,14 34,4 Z" />
        <!-- Tusk -->
        <path d="M 36,-10 L 46,-16 L 44,-12 Z" fill="#FFD700" />
        <!-- Front leg -->
        <rect x="12" y="14" width="8" height="22" rx="3" />
        <!-- Back leg -->
        <rect x="-16" y="14" width="8" height="22" rx="3" />
        <!-- Tail -->
        <path d="M -26,0 Q -36,-4 -34,-14" stroke="#8B0000" stroke-width="3" fill="none" stroke-linecap="round" />
        <!-- Eye -->
        <circle cx="32" cy="-12" r="2.5" fill="#FFD700" />
      </g>

      <!-- Right Elephant (facing left/inward, mirrored) -->
      <g transform="translate(70, -5) scale(-0.7, 0.7)" fill="#8B0000">
        <!-- Body -->
        <ellipse cx="0" cy="0" rx="28" ry="20" />
        <!-- Head -->
        <circle cx="25" cy="-8" r="16" />
        <!-- Ear -->
        <ellipse cx="15" cy="-12" rx="10" ry="14" />
        <!-- Trunk curling down -->
        <path d="M 38,-4 Q 48,5 44,18 Q 42,24 38,22 Q 40,14 34,4 Z" />
        <!-- Tusk -->
        <path d="M 36,-10 L 46,-16 L 44,-12 Z" fill="#FFD700" />
        <!-- Front leg -->
        <rect x="12" y="14" width="8" height="22" rx="3" />
        <!-- Back leg -->
        <rect x="-16" y="14" width="8" height="22" rx="3" />
        <!-- Tail -->
        <path d="M -26,0 Q -36,-4 -34,-14" stroke="#8B0000" stroke-width="3" fill="none" stroke-linecap="round" />
        <!-- Eye -->
        <circle cx="32" cy="-12" r="2.5" fill="#FFD700" />
      </g>

      <!-- Stars ring (simplified — 12 dots around the emblem) -->
      <g fill="#8B0000" opacity="0.8">
        <circle cx="0" cy="-42" r="2.5" />
        <circle cx="21" cy="-36" r="2.5" />
        <circle cx="36" cy="-21" r="2.5" />
        <circle cx="42" cy="0" r="2.5" />
        <circle cx="36" cy="21" r="2.5" />
        <circle cx="21" cy="36" r="2.5" />
        <circle cx="0" cy="42" r="2.5" />
        <circle cx="-21" cy="36" r="2.5" />
        <circle cx="-36" cy="21" r="2.5" />
        <circle cx="-42" cy="0" r="2.5" />
        <circle cx="-36" cy="-21" r="2.5" />
        <circle cx="-21" cy="-36" r="2.5" />
      </g>
    </g>
  </g>

  <!-- "TVK" text at the bottom -->
  <text x="256" y="470" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="36" fill="#FFD700" letter-spacing="8">TVK</text>
</svg>
