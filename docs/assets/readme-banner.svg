<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-label="THALAPATHY  TVK tribute banner">
  <defs>
    <linearGradient id="tvkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="55%" stop-color="#E31E24"/>
      <stop offset="100%" stop-color="#B5121A"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E31E24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="920" height="420" fill="#0d0d0d"/>
  <rect x="20" y="20" width="880" height="380" rx="12" fill="url(#tvkGrad)" opacity="0.15"/>
  <rect x="20" y="20" width="880" height="190" fill="#FFD700" opacity="0.12"/>
  <rect x="20" y="210" width="880" height="190" fill="#E31E24" opacity="0.18"/>

  <!-- TVK flag -->
