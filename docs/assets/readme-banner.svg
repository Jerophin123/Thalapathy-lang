    <rect x="142" y="315" width="72" height="22" rx="4" fill="#FFD700"/><text x="178" y="330" text-anchor="middle" fill="#B5121A">mersal</text>
    <rect x="224" y="315" width="72" height="22" rx="4" fill="#E31E24"/><text x="260" y="330" text-anchor="middle" fill="#FFD700">master</text>
    <rect x="306" y="315" width="72" height="22" rx="4" fill="#FFD700"/><text x="342" y="330" text-anchor="middle" fill="#B5121A">varisu</text>
    <rect x="388" y="315" width="72" height="22" rx="4" fill="#E31E24"/><text x="424" y="330" text-anchor="middle" fill="#FFD700">theri</text>
    <rect x="470" y="315" width="72" height="22" rx="4" fill="#FFD700"/><text x="506" y="330" text-anchor="middle" fill="#B5121A">sollu</text>
